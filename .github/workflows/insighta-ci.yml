name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: htmlhint "**/*.html"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no hardcoded API URLs
        run: |
          # Fail if any file references localhost:8080 directly
          if grep -r "localhost:8080" --include="*.html" --include="*.js" .; then
            echo "ERROR: hardcoded API URL found — use API_URL config instead"
            exit 1
          fi

      - name: Check no hardcoded 127.0.0.1
        run: |
          if grep -r "127\.0\.0\.1:8080" --include="*.html" --include="*.js" .; then
            echo "ERROR: hardcoded IP found — use API_URL config instead"
            exit 1
          fi

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all pages exist
        run: |
          for page in index.html dashboard.html profiles.html profile.html search.html account.html; do
            if [ ! -f "$page" ]; then
              echo "ERROR: missing required page $page"
              exit 1
            fi
          done
          echo "All required pages present"